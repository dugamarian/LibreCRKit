name: LibreCR
options:
  bundleIdPrefix: org.librecr
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
packages:
  LibreCRKit:
    path: ../..
targets:
  LibreCR:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Info.plist"
          - "Resources/**"
      - path: Sources/Resources/phone_cert_162b.bin
        buildPhase: resources
      - path: Sources/Resources/phone_cert_firstpair.bin
        buildPhase: resources
      - path: Shared
    dependencies:
      - package: LibreCRKit
      - target: LibreCRWidget
        embed: true
      - target: LibreCRWatch
        embed: true
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: LibreCR
        CFBundleIdentifier: org.librecr.LibreCR1
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSBluetoothAlwaysUsageDescription: "LibreCR needs Bluetooth to pair with and read your Libre 3 sensor."
        NFCReaderUsageDescription: "LibreCR uses NFC to scan and activate Libre 3 sensors."
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        UIBackgroundModes:
          - bluetooth-central
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Sources/LibreCR.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: org.librecr.LibreCR1
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/Info.plist
  LibreCRWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Widget
        excludes:
          - "Info.plist"
      - path: Shared
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: LibreCR
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Widget/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        PRODUCT_BUNDLE_IDENTIFIER: org.librecr.LibreCR1.Widget
        SKIP_INSTALL: YES
  LibreCRWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Watch
        excludes:
          - "Info.plist"
      - path: Sources/Resources/phone_cert_162b.bin
        buildPhase: resources
    dependencies:
      - package: LibreCRKit
    info:
      path: Watch/Info.plist
      properties:
        CFBundleDisplayName: LibreCR
        NSBluetoothAlwaysUsageDescription: "LibreCR uses Bluetooth to read your Libre 3 sensor directly from Apple Watch."
        UIBackgroundModes:
          - bluetooth-central
        WKCompanionAppBundleIdentifier: org.librecr.LibreCR1
        WKRunsIndependentlyOfCompanionApp: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Watch/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: org.librecr.LibreCR1.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
